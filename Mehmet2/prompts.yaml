# - prompt: lead_disease
#   condition: "lambda cohort, **kwargs: cohort"
#   question: |
#     For the given cohort: {cohort}, what are the lead diseases being studied?
#     Provide your response using the following format,
#     SOURCE-TEXT: [[<doc snippet containing answer>]]
#     ANSWER: [[<your answer>]]
#     Be concise when providing your answer.
- prompt: lead_disease
  question: |
    What are the lead diseases being studied in the protocol document?
    Provide your response using the following format,
    SOURCE-TEXT: [[<doc snippet containing answer>]]
    ANSWER: [[<your answer>]]
    Be concise when providing your answer.
- prompt: disease_code
  question: |
    What is the concept code for the term '{lead_disease}'? If there is no exact match, please provide the closest broader concept.
    Provide your response using the following format,
    ANSWER: [[<concept code>]]
